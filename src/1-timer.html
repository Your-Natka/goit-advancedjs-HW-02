<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <title>Timer</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="main">
    <div class="container">
      <nav class="nav">
        <a class="nav-logo" href="./index.html" aria-label="Site logo">
          <svg class="nav-logo-icon" width="100" height="30">
            <use href="img/sprite.svg#logo"></use>
          </svg>
        </a>
        <a class="back-link" href="./index.html">Back</a>
      </nav>
      <section class="section-timer">
        <div class="timer-form">
          <div class="timer-container container">
            <h2 class="visually-hidden">Timer</h2>
            <input class="timer-picker" type="text" id="datetime-picker" />
            <button class="start-btn" type="button" data-start>Start</button>
          </div>

          <div class="timer container">
            <div class="field">
              <span class="value" data-days>00</span>
              <span class="labell">Days</span>
            </div>
            <div class="field">
              <span class="value" data-hours>00</span>
              <span class="labell">Hours</span>
            </div>
            <div class="field">
              <span class="value" data-minutes>00</span>
              <span class="labell">Minutes</span>
            </div>
            <div class="field">
              <span class="value" data-seconds>00</span>
              <span class="labell">Seconds</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script type="module" src="./js/1-timer.js"></script>
</body>

</html>
