<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <title>Timer</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <svg style="display:none">
    <symbol id="ico-success" viewBox="0 0 24 24">
      <path fill="currentColor" d="M9 16.2l-3.5-3.5L4 14.2l5 5 12-12-1.5-1.5z" />
    </symbol>

    <symbol id="ico-error" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 
      10-4.5 10-10S17.5 2 12 2zm3 13.6L13.6 17 12 15.4 
      10.4 17 9 15.6 10.6 14 9 12.4l1.4-1.4L12 12.6 
      13.6 11l1.4 1.4L13.4 14l1.6 1.6z" />
    </symbol>

    <symbol id="ico-warning" viewBox="0 0 24 24">
      <path fill="currentColor" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
    </symbol>

    <symbol id="ico-info" viewBox="0 0 24 24">
      <path fill="currentColor" d="M11 9h2V7h-2v2zm0 8h2v-6h-2v6zm1-16C6.5 
      1 2 5.5 2 11s4.5 10 10 10 10-4.5 10-10S17.5 1 12 1z" />
    </symbol>
  </svg>
  <main class="main">
    <div class="container">
      <nav class="nav">
        <a class="nav-logo" href="./index.html" aria-label="Site logo">
          <svg class="nav-logo-icon" width="100" height="30">
            <use href="img/sprite.svg#logo"></use>
          </svg>
        </a>
        <a class="back-link" href="./index.html">Back</a>
      </nav>
      <section class="section-timer">
        <div class="timer-form">
          <div class="timer-container container">
            <h2 class="visually-hidden">Timer</h2>
            <input class="timer-picker" type="text" id="datetime-picker" />
            <button class="start-btn" type="button" data-start>Start</button>
          </div>

          <div class="timer container">
            <div class="field">
              <span class="value" data-days>00</span>
              <span class="labell">Days</span>
            </div>
            <div class="field">
              <span class="value" data-hours>00</span>
              <span class="labell">Hours</span>
            </div>
            <div class="field">
              <span class="value" data-minutes>00</span>
              <span class="labell">Minutes</span>
            </div>
            <div class="field">
              <span class="value" data-seconds>00</span>
              <span class="labell">Seconds</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script type="module" src="./js/1-timer.js"></script>
</body>

</html>
