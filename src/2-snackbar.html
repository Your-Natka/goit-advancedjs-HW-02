<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <title>Snackbar</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

  <main class="main">
    <div class="container">
      <nav class="nav">
        <a class="nav-logo" href="./index.html" aria-label="Site logo">
          <svg class="nav-logo-icon" width="100" height="30">
            <use href="img/sprite.svg#logo"></use>
          </svg>
        </a>
        <a class="back-link" href="./index.html">Back</a>
      </nav>
      <section class="section-snackbar">
        <h2 class="visually-hidden">Promise Generator</h2>

        <form class="form container">
          <label class="label">
            Delay (ms)
            <input class="input" type="number" name="delay" required />
          </label>

          <fieldset class="fieldset">
            <legend>State</legend>

            <label class="label-radio">
              <input class="radio" type="radio" name="state" value="fulfilled" required />
              Fulfilled
            </label>

            <label class="label-radio">
              <input class="radio" type="radio" name="state" value="rejected" required />
              Rejected
            </label>
          </fieldset>

          <button class="button" type="submit">Create notification</button>
        </form>
      </section>
    </div>
  </main>
  <script type="module" src="./js/2-snackbar.js"></script>

</body>

</html>
