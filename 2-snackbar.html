      <section class="section-snackbar">
        <h2 class="visually-hidden">Promise Generator</h2>

        <form class="form container">
          <label class="label">
            Delay (ms)
            <input class="input" type="number" name="delay" required />
          </label>

          <fieldset class="fieldset">
            <legend>State</legend>

            <label class="label-radio">
              <input class="radio" type="radio" name="state" value="fulfilled" required />

            </label>

            <label class="label-radio">
              <input class="radio" type="radio" name="state" value="rejected" required />
              Rejected
            </label>
          </fieldset>

          <button class="button" type="submit">Create notification</button>
        </form>
      </section>
    </div>
